<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- NO background rect — fully transparent -->

  <!-- outer hexagon -->
  <polygon
    points="150,28 252,84 252,196 150,252 48,196 48,84"
    fill="url(#hexFill)"
    stroke="url(#hexGrad)"
    stroke-width="3"
  />

  <!-- inner hexagon -->
  <polygon
    points="150,52 228,96 228,184 150,228 72,184 72,96"
    fill="none"
    stroke="url(#hexGrad)"
    stroke-width="1"
    opacity="0.3"
  />

  <!-- C - cyan -->
  <text x="118" y="128" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="52" font-weight="700"
    fill="#00e5ff">C</text>

  <!-- K - purple -->
  <text x="182" y="128" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="52" font-weight="700"
    fill="#a855f7">K</text>

  <!-- N - green -->
  <text x="118" y="192" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="52" font-weight="700"
    fill="#22d3a0">N</text>

  <!-- B - purple -->
  <text x="182" y="192" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="52" font-weight="700"
    fill="#a855f7">B</text>
</svg>
